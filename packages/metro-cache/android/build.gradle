buildscript {
  ext.safeExtGet = {prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
  namespace "com.modulefederation.metrocache"
  compileSdkVersion safeExtGet('compileSdkVersion', 35)

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 24)
    targetSdkVersion safeExtGet('targetSdkVersion', 35)

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20 -fexceptions -frtti"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  buildFeatures {
    prefab true
  }

  // Prefab packages from React Native
  packagingOptions {
    jniLibs {
      useLegacyPackaging = true
    }
  }

  externalNativeBuild {
    cmake {
      path "src/main/jni/CMakeLists.txt"
    }
  }

  sourceSets {
    main {
      java.srcDirs = ['src/main/java']
    }
  }
}

dependencies {
  implementation "com.facebook.react:react-android:+"
  implementation "com.squareup.okhttp3:okhttp:${safeExtGet('okhttp3Version', '4.12.0')}"
  implementation "com.facebook.fbjni:fbjni:${safeExtGet('fbjniVersion', '0.5.1')}"
}
